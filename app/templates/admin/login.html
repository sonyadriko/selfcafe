{% extends "base.html" %}

{% block title %}Login - Admin{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-canvas" style="padding: 48px 24px;">
    <div class="card card-elevated" style="padding: 48px; width: 100%; max-width: 420px;">
        <div class="text-center mb-8">
            <div class="eyebrow" style="justify-content: center; margin-bottom: 16px;">
                <span>SOWAN KOPI</span>
            </div>
            <h1 class="h2" style="letter-spacing: -0.02em;">Admin Login</h1>
        </div>

        {% if error %}
        <div class="p-4 rounded-xl mb-6" style="background: #FEE2E2; color: #991B1B;">
            <p class="text-small">{{ error }}</p>
        </div>
        {% endif %}

        <form method="post" action="/auth/login">
            <div class="mb-6">
                <label class="block text-small font-semibold mb-2" style="letter-spacing: 0.04em; text-transform: uppercase;">Username</label>
                <input type="text" name="username" required class="input" placeholder="Masukkan username">
            </div>
            <div class="mb-8">
                <label class="block text-small font-semibold mb-2" style="letter-spacing: 0.04em; text-transform: uppercase;">Password</label>
                <input type="password" name="password" required class="input" placeholder="Masukkan password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px 24px;">
                Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
