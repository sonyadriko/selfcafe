<!-- Sidebar Component -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <span class="sidebar-brand-dot"></span>
        <span style="font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;">Sowan Kopi</span>
        <p style="font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px;">Admin Panel</p>
    </div>

    <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="sidebar-link {% if request.path == '/admin/dashboard' %}active{% endif %}">
            <span>Dashboard</span>
        </a>
        <a href="/admin/orders" class="sidebar-link {% if request.path == '/admin/orders' %}active{% endif %}">
            <span>Pesanan</span>
        </a>
        <a href="/admin/menus" class="sidebar-link {% if request.path == '/admin/menus' %}active{% endif %}">
            <span>Menu</span>
        </a>

        <div class="sidebar-divider"></div>

        <a href="/auth/logout" class="sidebar-link">
            <span>Keluar</span>
        </a>
    </nav>
</aside>

<style>
/* Mobile-only toggle button - inline because it's dynamic */
.mobile-menu-btn {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 200;
    width: 44px;
    height: 44px;
    background: var(--color-ink-black);
    border: none;
    border-radius: var(--radius-md);
    color: var(--color-white);
    cursor: pointer;
    align-items: center;
    justify-content: center;
}

@media (max-width: 768px) {
    .mobile-menu-btn {
        display: flex;
    }

    .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
    }

    .sidebar.open {
        transform: translateX(0);
    }

    .main-content {
        padding-top: 80px;
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}
</style>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}
</script>
