{% extends "base.html" %}

{% block title %}Menu - SelfCafe{% endblock %}

{% block extra_head %}
<style>
.header-sticky {
    position: sticky;
    top: 24px;
    z-index: 100;
}

.cart-panel {
    position: fixed;
    right: 0;
    top: 0;
    height: 100vh;
    width: 100%;
    max-width: 400px;
    background: var(--color-white);
    box-shadow: var(--shadow-card);
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 1000;
}

.cart-panel.open {
    transform: translateX(0);
}

.menu-item-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: var(--color-lifted-cream);
}

.add-btn {
    background: var(--color-coffee-medium);
    color: var(--color-white);
    border: none;
    border-radius: var(--radius-pill);
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
}

.add-btn:hover {
    background: var(--color-coffee-dark);
}

.qty-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--color-ink-black);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.qty-btn:hover {
    background: var(--color-lifted-cream);
}

.close-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen bg-canvas">
    <!-- Header -->
    <header class="header-sticky container">
        <div class="nav-pill justify-between">
            <h1 class="h3">Sowan Kopi</h1>
            <div class="flex items-center gap-4">
                <span class="text-small text-muted">Meja <span class="text-ink font-semibold" id="tableNumber">{{ table }}</span></span>
                <button onclick="openCart()" class="btn btn-primary cart-badge">
                    Keranjang
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Categories -->
    <section class="section" style="padding-top: 48px">
        <div class="container">
            <div class="flex gap-2" style="overflow-x: auto; padding-bottom: 8px;" id="categoryFilters">
                <button onclick="filterCategory('all')" class="category-pill active">Semua</button>
            </div>
        </div>
    </section>

    <!-- Menu Grid -->
    <section class="section" style="padding-top: 0;">
        <div class="container">
            <div class="menu-grid" id="menuGrid">
                <!-- Menu items loaded here -->
            </div>
        </div>
    </section>

    <!-- Cart Panel -->
    <div class="cart-overlay" id="cartOverlay" onclick="closeCart()" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999;"></div>
    <aside class="cart-panel" id="cartPanel">
        <div class="modal-header">
            <h2 class="h3">Keranjang</h2>
            <button class="close-btn" onclick="closeCart()">&times;</button>
        </div>
        <div class="modal-body" id="cartItems" style="overflow-y: auto; max-height: calc(100vh - 200px);">
            <!-- Cart items here -->
        </div>
        <div class="modal-footer">
            <div class="flex justify-between mb-4">
                <span class="font-semibold">Total:</span>
                <span class="h3" id="cartTotal">Rp 0</span>
            </div>
            <button onclick="placeOrder()" class="btn btn-primary" style="width: 100%;">
                Pesan Sekarang
            </button>
        </div>
    </aside>
</div>

<script>
let cart = [];
let tableNumber = {{ table }};

async function loadMenu() {
    const response = await fetch('/customer/menu');
    const data = await response.json();
    renderMenu(data.menus, data.categories);
}

function renderMenu(menus, categories) {
    const categoryFilters = document.getElementById('categoryFilters');
    categoryFilters.innerHTML = '<button onclick="filterCategory(\'all\')" class="category-pill active">Semua</button>';
    categories.forEach(cat => {
        categoryFilters.innerHTML += `<button onclick="filterCategory('${cat.id}')" class="category-pill">${cat.name}</button>`;
    });

    window.allMenus = menus;
    filterCategory('all');
}

function filterCategory(categoryId) {
    const filtered = categoryId === 'all'
        ? window.allMenus
        : window.allMenus.filter(m => m.category_id === parseInt(categoryId));

    const menuGrid = document.getElementById('menuGrid');
    menuGrid.innerHTML = filtered.map(menu => `
        <div class="menu-card">
            ${menu.image_url ? `<img src="${menu.image_url}" alt="${menu.name}" class="menu-item-img">` : '<div class="menu-item-img flex items-center justify-center text-muted">No Image</div>'}
            <div class="menu-card-content">
                <h3 class="menu-card-title">${menu.name}</h3>
                <p class="menu-card-description">${menu.description || ''}</p>
                <div class="flex justify-between items-center">
                    <span class="menu-card-price">Rp ${parseInt(menu.price).toLocaleString('id-ID')}</span>
                    <button onclick="addToCart(${menu.id})" class="add-btn">+ Tambah</button>
                </div>
            </div>
        </div>
    `).join('');

    document.querySelectorAll('.category-pill').forEach(btn => {
        btn.classList.remove('active');
        btn.style.backgroundColor = '';
        btn.style.color = '';
        btn.style.borderColor = '';
    });
    event.target.classList.add('active');
}

function addToCart(menuId) {
    const menu = window.allMenus.find(m => m.id === menuId);
    const existing = cart.find(item => item.menu_id === menuId);

    if (existing) {
        existing.quantity++;
    } else {
        cart.push({
            menu_id: menu.id,
            name: menu.name,
            price: menu.price,
            quantity: 1
        });
    }

    updateCartUI();
}

function updateCartUI() {
    document.getElementById('cartCount').textContent = cart.reduce((sum, item) => sum + item.quantity, 0);

    const cartItems = document.getElementById('cartItems');
    if (cart.length === 0) {
        cartItems.innerHTML = '<p class="text-muted text-center">Keranjang kosong</p>';
    } else {
        cartItems.innerHTML = cart.map((item, index) => `
            <div class="flex justify-between items-center" style="padding: 16px 0; border-bottom: 1px solid rgba(0,0,0,0.1);">
                <div>
                    <p class="font-semibold">${item.name}</p>
                    <p class="text-small text-muted">Rp ${parseInt(item.price).toLocaleString('id-ID')}</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="updateQuantity(${index}, -1)" class="qty-btn">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="updateQuantity(${index}, 1)" class="qty-btn">+</button>
                </div>
            </div>
        `).join('');
    }

    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    document.getElementById('cartTotal').textContent = `Rp ${total.toLocaleString('id-ID')}`;
}

function updateQuantity(index, delta) {
    cart[index].quantity += delta;
    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }
    updateCartUI();
}

function openCart() {
    document.getElementById('cartPanel').classList.add('open');
    document.getElementById('cartOverlay').style.display = 'block';
}

function closeCart() {
    document.getElementById('cartPanel').classList.remove('open');
    document.getElementById('cartOverlay').style.display = 'none';
}

async function placeOrder() {
    if (cart.length === 0) {
        alert('Keranjang kosong!');
        return;
    }

    const response = await fetch('/customer/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            table_number: tableNumber,
            items: cart.map(item => ({
                menu_id: item.menu_id,
                quantity: item.quantity
            }))
        })
    });

    if (response.ok) {
        cart = [];
        updateCartUI();
        closeCart();
        alert('Pesanan berhasil! Silakan tunggu di meja Anda.');
    } else {
        alert('Gagal membuat pesanan');
    }
}

loadMenu();
</script>
{% endblock %}
