services:
  db:
    image: mysql:8.0
    container_name: selfcafe_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: selfcafe_db
      MYSQL_USER: selfcafe
      MYSQL_PASSWORD: selfcafepass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: selfcafe_app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: selfcafe
      DB_PASSWORD: selfcafepass
      DB_NAME: selfcafe_db
      SECRET_KEY: change-this-secret-key-in-production
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  mysql_data:
